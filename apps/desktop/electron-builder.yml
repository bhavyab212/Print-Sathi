appId: com.printsathi.desktop
productName: Print Sathi
copyright: Copyright © 2026 Print Sathi

directories:
  output: release

files:
  - dist-electron
  - dist-renderer
  - package.json

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico
  requestedExecutionLevel: asUser

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  installerIcon: resources/icon.ico
  uninstallerIcon: resources/icon.ico
  installerHeaderIcon: resources/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Print Sathi

publish:
  provider: github
  owner: bhavyab212
  repo: Print-Sathi
